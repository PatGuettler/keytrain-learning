# Supabase project config. Push to remote: supabase link && supabase config push
# See scripts/deploy-manage-users.sh

[auth]
site_url = "https://keytrainlearning.com"
additional_redirect_urls = [
  "https://keytrainlearning.com/**",
  "https://keytrainlearning.com/accept-invite",
  "https://keytrainlearning.com/reset-password",
  "https://keytrainlearning.com/login",
  "https://keytrainlearning.com/phishing-training",
  "http://localhost:5173/**",
  "http://localhost:3000/**",
]

# JWT is validated inside the function (admin check). Gateway verify_jwt must be false
# so browser CORS preflight (OPTIONS) succeeds from GitHub Pages / localhost.
[functions.manage-users]
verify_jwt = false

[functions.send-support-request]
verify_jwt = false

[functions.get-daily-verse]
verify_jwt = false

[functions.submit-prayer-request]
verify_jwt = false

[functions.send-phishing-campaign]
verify_jwt = false

[functions.track-phishing-event]
verify_jwt = false

[functions.record-failed-login]
verify_jwt = false

[functions.aws-hive-bridge]
verify_jwt = false

[functions.aws-railnet-signatures]
verify_jwt = false
