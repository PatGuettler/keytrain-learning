name: Supabase backup artifacts

# Produces a recoverable dump of schema, data, auth, and storage inventory.
# Artifact is private to this repo. Also run scripts/backup-supabase.sh locally
# and copy archives offline — Actions retention is not permanent DR.

on:
  schedule:
    # 06:15 UTC daily
    - cron: '15 6 * * *'
  workflow_dispatch:
    inputs:
      skip_storage_download:
        description: 'Skip downloading storage object bytes (inventory only)'
        required: false
        default: true
        type: boolean

concurrency:
  group: supabase-backup
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the secrets above under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Run backup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          chmod +x scripts/backup-supabase.sh
          EXTRA=()
          # Default: skip heavy storage bytes on schedule; allow full download when secret present + manual
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.skip_storage_download }}" = "true" ]; then
            EXTRA+=(--skip-storage-download)
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            EXTRA+=(--skip-storage-download)
            echo "SUPABASE_SERVICE_ROLE_KEY not set — storage inventory/download skipped."
          fi
          if [ -z "${VITE_SUPABASE_URL:-}" ]; then
            export VITE_SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          fi
          bash scripts/backup-supabase.sh --keep 3 "${EXTRA[@]}"

      - name: Upload backup archive
        uses: actions/upload-artifact@v4
        with:
          name: keytrain-supabase-backup-${{ github.run_id }}
          path: |
            supabase/backups/*.tar.gz
            supabase/backups/*.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Summary
        run: |
          echo "### Supabase backup" >> "$GITHUB_STEP_SUMMARY"
          ls -lh supabase/backups/*.tar.gz | tee -a "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the artifact from this run. Restore steps: \`supabase/backups/RESTORE.md\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Secret **values** are not in the dump — keep them in your password manager." >> "$GITHUB_STEP_SUMMARY"
