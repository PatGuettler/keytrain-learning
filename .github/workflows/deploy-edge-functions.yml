name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy manage-users
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          INVITE_REDIRECT_URL: https://keytrainlearning.com/accept-invite
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping: add SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF repo secrets."
            exit 0
          fi
          npx --yes supabase@latest link --project-ref "$SUPABASE_PROJECT_REF" --yes || true
          npx --yes supabase@latest config push --yes || true
          npx --yes supabase@latest secrets set "INVITE_REDIRECT_URL=$INVITE_REDIRECT_URL" --project-ref "$SUPABASE_PROJECT_REF"
          npx --yes supabase@latest functions deploy manage-users --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          npx --yes supabase@latest functions deploy record-failed-login --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy spiritual functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping spiritual deploy: missing repo secrets."
            exit 0
          fi
          npx --yes supabase@latest functions deploy get-daily-verse --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          npx --yes supabase@latest functions deploy submit-prayer-request --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy phishing functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping phishing deploy: missing repo secrets."
            exit 0
          fi
          npx --yes supabase@latest functions deploy send-phishing-campaign --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          npx --yes supabase@latest functions deploy track-phishing-event --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Verify function exists
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then exit 0; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/manage-users" \
            -H "Origin: https://keytrainlearning.com" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: authorization,content-type,apikey")
          echo "OPTIONS status: $code"
          if [ "$code" = "404" ]; then
            echo "ERROR: manage-users still returns 404 after deploy"
            exit 1
          fi
