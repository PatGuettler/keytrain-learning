name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-${{ github.ref }}
  # Do not cancel an in-flight Pages deploy — it can wedge the environment (deploy-pages #22).
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Builds for https://keytrainlearning.com (custom domain on GitHub Pages)
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
          GH_PAGES_BASE: /
          VITE_APP_URL: https://keytrainlearning.com
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify Pages artifact
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/404.html
          echo "Pages artifact OK ($(du -sh dist | cut -f1))"

      # v3 action archives are no longer on codeload.github.com — use v5.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry Pages deploy (transient GitHub failures)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5

      - name: Require successful deploy
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "::error::Pages deploy failed twice. Re-run this workflow or check Settings → Pages."
          exit 1
