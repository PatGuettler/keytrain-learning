<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .card {
        width: 100%;
        max-width: 400px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        padding: 32px 28px;
      }
      .logo {
        display: flex;
        justify-content: center;
        margin-bottom: 8px;
        color: #0f766e;
        font-size: 28px;
        font-weight: 700;
      }
      h1 {
        margin: 0 0 8px;
        text-align: center;
        font-size: 22px;
      }
      p {
        margin: 0 0 24px;
        text-align: center;
        color: #64748b;
        font-size: 14px;
      }
      label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
        color: #334155;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 16px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 12px;
        border: 0;
        border-radius: 8px;
        background: #0f766e;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .note {
        margin-top: 16px;
        font-size: 11px;
        color: #94a3b8;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🛡 GuardianMD</div>
      <h1>Sign in</h1>
      <p>Healthcare training &amp; incident reporting</p>
      <form id="login-form" method="POST" action="#">
        <input type="hidden" name="event" value="credential_submission" />
        <input type="hidden" name="token" id="token-field" value="" />
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@hospital.org" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Password" required />
        <button type="submit">Sign in</button>
      </form>
      <p class="note">Authorized security awareness simulation — passwords are never stored.</p>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token') || '';
        var trackBase = params.get('track') || '';
        document.getElementById('token-field').value = token;
        var form = document.getElementById('login-form');
        if (trackBase) {
          form.action = trackBase.replace(/\/$/, '');
        } else {
          form.addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Configure the track URL when sending campaigns (added automatically by send-phishing-campaign).');
          });
        }
      })();
    </script>
  </body>
</html>
